name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main, staging]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: TypeScript check
        run: npm run typecheck

      - name: Build worker + frontend
        run: npm run build

      - name: Build frontend assets
        run: npm run build
        working-directory: frontend

      - name: Run backend tests
        run: npm run test

      - name: Run frontend tests
        run: npm run test
        working-directory: frontend

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build worker + frontend
        run: npm run build

      - name: Build frontend assets
        run: npm run build
        working-directory: frontend

      - name: Deploy to production
        if: github.ref == 'refs/heads/main'
        run: npx wrangler deploy --message "${GITHUB_SHA::7} — $(git log -1 --pretty=%s)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to staging
        if: github.ref == 'refs/heads/staging'
        run: npx wrangler deploy --env staging --config wrangler.toml --message "${GITHUB_SHA::7} — $(git log -1 --pretty=%s)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  smoke-test:
    needs: [deploy]
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Run smoke tests against staging
        run: npx playwright test --config playwright.smoke.config.ts
        env:
          BASE_URL: https://staging.scbridge.app

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-screenshots
          path: e2e/test-results/smoke/
