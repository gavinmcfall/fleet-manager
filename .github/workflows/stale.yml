name: Close Stale Issues

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been idle for 60 days with no activity.
            It will be closed in 14 days unless there's an update.
            If this is still relevant, please comment to keep it open.
          close-issue-message: >
            Closing due to inactivity. If this is still an issue on the latest
            version of SC Bridge, please open a new report with the current details.
          exempt-issue-labels: pinned,confirmed,in-progress
          # Never close discussions of which there are none here, but keep PRs tidy too
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: >
            This PR has been idle for 30 days. It will be closed in 7 days unless updated.
          close-pr-message: >
            Closing due to inactivity.
