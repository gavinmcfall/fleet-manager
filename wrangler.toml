# ══════════════════════════════════════════════
# SC Bridge — Cloudflare Worker Configuration
# ══════════════════════════════════════════════
# IMPORTANT: Always deploy with --env production or --env staging.
# Running without --env will fail (no bindings configured at top level).

main = "src/index.ts"
compatibility_date = "2025-02-18"
compatibility_flags = ["nodejs_compat"]
account_id = "92557ddeffaf43d64db74acf783ec49d"

# Workers Assets — shared across environments
# Worker runs first so /api/* routes are matched before Assets CDN
[assets]
binding = "ASSETS"
directory = "./frontend/dist"
not_found_handling = "single-page-application"
run_worker_first = true

# ── Test/Local D1 binding (required for vitest-pool-workers) ──
# This is never used for deployment (always use --env production or --env staging).
# It exists solely so miniflare can create a local D1 binding for tests.
[[d1_databases]]
binding = "DB"
database_name = "scbridge-test"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "src/db/migrations"

# ── Production Environment ──
[env.production]
name = "scbridge"
workers_dev = true
preview_urls = false

# Custom Domain bindings — dormant until scbridge.app NS flip completes on
# SC Bridge CF account. Workers.dev URLs continue working independently.
[[env.production.routes]]
pattern = "scbridge.app"
zone_name = "scbridge.app"
custom_domain = true

[[env.production.d1_databases]]
binding = "DB"
database_name = "scbridge-production"
database_id = "673a1493-df10-4fe2-bc39-e24b649c538f"
migrations_dir = "src/db/migrations"

[[env.production.kv_namespaces]]
binding = "SC_BRIDGE_CACHE"
id = "608aaea06e2b4177b7e824a05e680ff3"

[[env.production.kv_namespaces]]
binding = "LOCALIZATION_KV"
id = "2ec90d2a93d44e83921625176255a8bd"

[[env.production.r2_buckets]]
binding = "AVATARS"
bucket_name = "scbridge-avatars-production"

[env.production.triggers]
crons = [
  "30 3 * * *",  # session cleanup
  "45 3 * * *",  # RSI API images (ships + paints)
  "0 */2 * * *", # UEX commodity prices (every 2h)
  "30 5 * * *",  # UEX item prices (daily)
]

[env.production.vars]
RSI_API_ENABLED = "true"
RSI_BASE_URL = "https://robertsspaceindustries.com"
RSI_RATE_LIMIT = "1.0"
ENVIRONMENT = "production"
BETTER_AUTH_URL = "https://scbridge.app"
EMAIL_FROM = "SC Bridge <noreply@scbridge.app>"

# Production observability — Grafana Cloud and New Relic
[env.production.observability]

[env.production.observability.logs]
enabled = true
invocation_logs = true
destinations = ["grafana-logs", "newrelic-logs"]
head_sampling_rate = 1.0

[env.production.observability.traces]
enabled = true
destinations = ["grafana-traces", "newrelic-traces"]
head_sampling_rate = 1.0

# ── Staging Environment ──
[env.staging]
name = "scbridge-staging"
workers_dev = true
preview_urls = false

# Custom Domain binding — dormant until scbridge.app NS flip completes.
[[env.staging.routes]]
pattern = "staging.scbridge.app"
zone_name = "scbridge.app"
custom_domain = true

[[env.staging.d1_databases]]
binding = "DB"
database_name = "scbridge-staging"
database_id = "21556b70-381e-4805-9ecd-0224ee2334f6"
migrations_dir = "src/db/migrations"

[[env.staging.kv_namespaces]]
binding = "SC_BRIDGE_CACHE"
id = "c43dfff89ae445a897916dc8e3fa7967"

[[env.staging.kv_namespaces]]
binding = "LOCALIZATION_KV"
id = "2ec90d2a93d44e83921625176255a8bd"

[[env.staging.r2_buckets]]
binding = "AVATARS"
bucket_name = "scbridge-avatars-staging"

[env.staging.triggers]
crons = []

[env.staging.vars]
RSI_API_ENABLED = "false"
ENVIRONMENT = "staging"
BETTER_AUTH_URL = "https://scbridge-staging.ops-925.workers.dev"
EMAIL_FROM = "SC Bridge Staging <noreply@scbridge.app>"
RSI_BASE_URL = "https://robertsspaceindustries.com"
RSI_RATE_LIMIT = "1.0"

# Staging observability — New Relic only
[env.staging.observability]
logs = { enabled = true, invocation_logs = true, head_sampling_rate = 1.0, destinations = ["newrelic-logs-staging"] }
traces = { enabled = true, head_sampling_rate = 1.0, destinations = ["newrelic-traces-staging"] }
