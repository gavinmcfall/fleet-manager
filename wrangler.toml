name = "sc-bridge"
main = "src/index.ts"
compatibility_date = "2025-02-18"
compatibility_flags = ["nodejs_compat"]
account_id = "4214879ee537a4840de659aafb7bf201"
workers_dev = false
preview_urls = false

# Workers Assets — Worker runs first so /api/* routes are matched before Assets CDN
[assets]
binding = "ASSETS"
directory = "./frontend/dist"
not_found_handling = "single-page-application"
run_worker_first = true

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "sc-companion"
database_id = "56875a7e-0ebd-4455-887d-5d1e1afdb416"
migrations_dir = "src/db/migrations"

# R2 bucket for user avatar uploads
[[r2_buckets]]
binding = "AVATARS"
bucket_name = "sc-bridge-avatars"

# Cron Triggers
[triggers]
crons = [
  "30 3 * * *",  # session cleanup
  "45 3 * * *",  # RSI API images (ships + paints)
]

# Environment variables (non-secret defaults)
[vars]
RSI_API_ENABLED = "true"
RSI_BASE_URL = "https://robertsspaceindustries.com"
RSI_RATE_LIMIT = "1.0"
ENVIRONMENT = "production"
BETTER_AUTH_URL = "https://scbridge.app"
EMAIL_FROM = "SC Bridge <noreply@scbridge.app>"

# Workers Observability — structured logs + OTEL export to Grafana Cloud
[observability]

[observability.logs]
enabled = true
invocation_logs = true
destinations = ["grafana-logs", "newrelic-logs"]
head_sampling_rate = 1.0

[observability.traces]
enabled = true
destinations = ["grafana-traces", "newrelic-traces"]
head_sampling_rate = 1.0
