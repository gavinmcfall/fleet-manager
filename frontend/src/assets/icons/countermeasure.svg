<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
  <!-- Countermeasure: flare/chaff canister ejecting decoys -->
  <!-- Launcher body (left block) -->
  <rect x="2" y="9" width="8" height="6" rx="1.5"/>
  <!-- Three ejected flares/chaff packets (right, diverging) -->
  <!-- Top flare -->
  <path d="M10 11.5L20 7L18 10.5L10 11.5Z"/>
  <!-- Middle flare -->
  <rect x="10" y="11" width="10" height="2" rx="1"/>
  <!-- Bottom flare -->
  <path d="M10 12.5L20 17L18 13.5L10 12.5Z"/>
</svg>
